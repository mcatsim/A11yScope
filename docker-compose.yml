services:
  a11yscope:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./output:/app/output
      - a11yscope-data:/app/data
    environment:
      - A11YSCOPE_CANVAS_BASE_URL=${A11YSCOPE_CANVAS_BASE_URL:-https://canvas.yourschool.edu}
      - A11YSCOPE_CANVAS_API_TOKEN=${A11YSCOPE_CANVAS_API_TOKEN:-}
      - A11YSCOPE_SHARED_CANVAS_TOKEN=${A11YSCOPE_SHARED_CANVAS_TOKEN:-}
      - A11YSCOPE_AI_PROVIDER=${A11YSCOPE_AI_PROVIDER:-}
      - A11YSCOPE_AI_API_KEY=${A11YSCOPE_AI_API_KEY:-}
      - A11YSCOPE_AI_MODEL=${A11YSCOPE_AI_MODEL:-}
      # Auth
      - A11YSCOPE_AUTH_MODE=${A11YSCOPE_AUTH_MODE:-none}
      - A11YSCOPE_SECRET_KEY=${A11YSCOPE_SECRET_KEY:-}
      - A11YSCOPE_DATABASE_URL=${A11YSCOPE_DATABASE_URL:-sqlite+aiosqlite:///data/a11yscope.db}
      - A11YSCOPE_ADMIN_EMAIL=${A11YSCOPE_ADMIN_EMAIL:-admin@localhost}
      - A11YSCOPE_ADMIN_PASSWORD=${A11YSCOPE_ADMIN_PASSWORD:-}
      # SSO
      - A11YSCOPE_SSO_PROTOCOL=${A11YSCOPE_SSO_PROTOCOL:-oidc}
      - A11YSCOPE_SSO_OIDC_DISCOVERY_URL=${A11YSCOPE_SSO_OIDC_DISCOVERY_URL:-}
      - A11YSCOPE_SSO_OIDC_CLIENT_ID=${A11YSCOPE_SSO_OIDC_CLIENT_ID:-}
      - A11YSCOPE_SSO_OIDC_CLIENT_SECRET=${A11YSCOPE_SSO_OIDC_CLIENT_SECRET:-}
      - A11YSCOPE_SSO_SAML_METADATA_URL=${A11YSCOPE_SSO_SAML_METADATA_URL:-}
      - A11YSCOPE_SSO_SAML_ENTITY_ID=${A11YSCOPE_SSO_SAML_ENTITY_ID:-}
      - A11YSCOPE_SSO_DEFAULT_ROLE=${A11YSCOPE_SSO_DEFAULT_ROLE:-auditor}
      - A11YSCOPE_SSO_AUTO_CREATE_USERS=${A11YSCOPE_SSO_AUTO_CREATE_USERS:-true}
    restart: unless-stopped

  # Optional: PostgreSQL for production
  # Uncomment and set A11YSCOPE_DATABASE_URL=postgresql+asyncpg://a11yscope:secret@postgres/a11yscope
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: a11yscope
  #     POSTGRES_USER: a11yscope
  #     POSTGRES_PASSWORD: secret
  #   volumes:
  #     - pg-data:/var/lib/postgresql/data

volumes:
  a11yscope-data:
  # pg-data:
