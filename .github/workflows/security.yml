name: Security — SAST & Dependency Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC
    - cron: "0 8 * * 1"

jobs:
  bandit-sast:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install "bandit[toml]"
      - name: Run Bandit (Python SAST)
        run: bandit -r src/ -c pyproject.toml -f json -o bandit-report.json || true
      - name: Display results
        run: bandit -r src/ -c pyproject.toml -ll
      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  semgrep-sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        run: semgrep scan --config auto --json --output semgrep-report.json src/ || true
      - name: Display results
        run: semgrep scan --config auto src/ || true
      - name: Upload Semgrep report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: semgrep-report.json

  pip-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project + pip-audit
        run: pip install ".[web]" pip-audit
      - name: Run pip-audit (CVE check)
        run: pip-audit --format json --output pip-audit-report.json || true
      - name: Display results
        run: pip-audit
      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  trivy-container:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t canvas-a11y:scan .
      - name: Run Trivy container scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: canvas-a11y:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0
