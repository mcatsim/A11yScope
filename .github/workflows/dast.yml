name: DAST — Dynamic Application Security Testing

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zap-dast:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start app
        run: |
          docker build -t accessiflow:dast .
          docker run -d --name accessiflow-dast -p 8080:8080 accessiflow:dast
          sleep 5
          curl -sf http://localhost:8080/health

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".github/zap-rules.tsv"
          cmd_options: "-a -j"
          allow_issue_writing: false

      - name: Stop container
        if: always()
        run: docker stop accessiflow-dast || true

  nikto-scan:
    name: Nikto Web Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start app
        run: |
          docker build -t accessiflow:nikto .
          docker run -d --name accessiflow-nikto -p 8080:8080 accessiflow:nikto
          sleep 5

      - name: Install Nikto
        run: sudo apt-get update && sudo apt-get install -y nikto

      - name: Run Nikto
        run: nikto -h http://localhost:8080 -Format json -output nikto-report.json -Tuning 1234567890 || true

      - name: Upload Nikto report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nikto-report
          path: nikto-report.json

      - name: Stop container
        if: always()
        run: docker stop accessiflow-nikto || true
